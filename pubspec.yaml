name: treino
description: "TREINO — fitness app multiplataforma."
publish_to: 'none'
version: 0.1.0+4

environment:
  sdk: ^3.5.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_storage: ^12.3.0
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.3
  firebase_app_check: ^0.3.2
  image_picker: ^1.1.2
  image_cropper: ^9.0.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  font_awesome_flutter: ^10.7.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  cloud_firestore: ^5.4.0
  cloud_functions: ^5.2.0
  file_picker: ^8.1.2
  excel: ^4.0.6
  web: ^1.1.0
  google_sign_in: ^7.1.0
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.3
  characters: ^1.3.0
  geolocator: ^13.0.0
  http: ^1.2.2
  table_calendar: ^3.2.0
  flutter_map: ^7.0.2
  flutter_map_marker_cluster: ^1.3.6
  latlong2: ^0.9.1
  # ExerciseVideoPlayer is dual-mode:
  # • YouTube links → thumbnail card; tap opens youtube.com in a
  #   Safari View Controller / Chrome Custom Tab via url_launcher's
  #   inAppBrowserView mode (the user never leaves TREINO).
  # • Firebase Storage videos (trainer's own uploads) → native inline
  #   playback via video_player, no WebView in the loop at all.
  # We landed here after 7 iterations proving that YouTube embeds inside
  # any iOS WKWebView wrapper get rejected with Error 152/153 by YouTube's
  # server-side "real browser" check.
  url_launcher: ^6.3.0
  video_player: ^2.9.0
  shared_preferences: ^2.3.0
  fl_chart: ^1.2.0
  firebase_messaging: ^15.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  mocktail: ^1.0.4
  fake_cloud_firestore: ^3.0.3
  # Generates ios/Runner/Assets.xcassets/AppIcon.appiconset/ from a single
  # 1024×1024 source (assets/icon/app_icon.png). Run after changing the
  # source: `dart run flutter_launcher_icons`. NOT a runtime dependency
  # — only invoked during build setup.
  flutter_launcher_icons: ^0.14.4

# flutter_launcher_icons config — see docs for android/web options if
# we ever ship those targets. For now: iOS-only, mobile-only project.
flutter_launcher_icons:
  ios: true
  android: false
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/routines/
    - assets/muscles/
    - assets/exercises/
    - assets/body/
