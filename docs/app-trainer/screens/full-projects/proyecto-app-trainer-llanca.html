<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>TREINO — App Entrenador</title>
<style>
  html, body { margin: 0; padding: 0; background: #0A0A0A; }
  body { font-family: 'Barlow', -apple-system, system-ui, sans-serif; color: #fff; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="pf-tokens.jsx"></script>
<script type="text/babel" src="pf-mobile.jsx"></script>

<script type="text/babel" data-presets="react">
  const W = 390, H = 844;
  const Frame = ({ children }) => (
    <IOSDevice width={W} height={H} dark>{children}</IOSDevice>
  );

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="overview" title="TREINO · App Entrenador" subtitle="Companion móvil — consulta, reaccionar, acciones rápidas · Mar 2026">
          <DCArtboard id="home" label="01 · Inicio" width={W} height={H}>
            <Frame><PFMobileHome/></Frame>
          </DCArtboard>
          <DCArtboard id="alumnos" label="02 · Alumnos" width={W} height={H}>
            <Frame><PFMobileAlumnos/></Frame>
          </DCArtboard>
          <DCArtboard id="agenda" label="03 · Agenda" width={W} height={H}>
            <Frame><PFMobileAgenda/></Frame>
          </DCArtboard>
        </DCSection>

        <DCSection id="comm" title="Comunicación y detalle" subtitle="Chat con alumnos + perfil rápido">
          <DCArtboard id="chat" label="04 · Chat" width={W} height={H}>
            <Frame><PFMobileChat/></Frame>
          </DCArtboard>
          <DCArtboard id="alumno" label="05 · Alumno (vista rápida)" width={W} height={H}>
            <Frame><PFMobileAlumnoQuick/></Frame>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
