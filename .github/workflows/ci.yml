name: CI

# Corre en cada PR a main y en cada push a main. El objetivo: que NINGÚN merge
# que no compile o que rompa tests pueda entrar a main (los breakages de #150 y
# #152/#153 habrían sido frenados acá).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela runs viejos del mismo PR/branch para no gastar minutos al pedo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Fijado a la versión del entorno de desarrollo para reproducibilidad.
          # Si actualizan Flutter local, actualizá este número.
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Falla ante ERRORES (los args duplicados / marcadores de conflicto /
      # nombres indefinidos que se colaron a main por merges malos son errores).
      # Warnings/infos NO bloquean — hay deuda de lint pre-existente en el l10n
      # generado que no queremos que trabe todos los PRs.
      - name: Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      # El gate duro: si el código no compila o falla algún test, el job falla
      # y (con branch protection activada) el PR NO se puede mergear.
      - name: Run tests
        run: flutter test

  # Gate de compilación para las Cloud Functions (functions/, Node 20 + TS).
  # Antes NADIE compilaba functions en CI: flutter analyze/test no ven functions/,
  # así que un error de tipos o de compilación en functions/src podía entrar a
  # main sin que nada lo frenara. Este job corre `tsc` y falla ante cualquiera.
  # Los tests jest (que necesitan el Emulator Suite) viven en el job
  # `functions-test` de abajo — este queda como gate de compilación puro y rápido.
  functions-build:
    name: Functions Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      # Instala exactamente lo del lockfile (reproducible, igual que en local).
      - name: Install functions dependencies
        run: npm --prefix functions ci

      - name: Build functions (tsc)
        run: npm --prefix functions run build

  # Tests jest de las Cloud Functions contra el Firebase Emulator Suite.
  # El build de arriba solo garantiza que compila; ESTE job garantiza que la
  # LÓGICA (cascades, notificaciones, ranking-aggregate, reglas de Firestore)
  # hace lo que dice. Corre en paralelo con functions-build: señales de fallo
  # independientes (compila-pero-rompe-tests vs no-compila).
  #
  # Requisitos del emulador (firebase-tools 15.19.0): Java 21+ (con 17 ni
  # arranca) y firebase-tools instalado global (NO es dependencia de functions/).
  #
  # Los tests están partidos por project A PROPÓSITO y se corren en DOS pasadas
  # separadas para no chocar con `singleProjectMode: true` de firebase.json:
  #   1. Emulator-backed (admin SDK, project `treino-dev`): cascades, notify-*,
  #      ranking-aggregate, etc. Necesitan firestore+auth+storage.
  #   2. Rules (`@firebase/rules-unit-testing`, project `treino-rules-test*`):
  #      los `*-rules.test.ts`. Solo firestore+auth. Ya existía el script
  #      `test:rules:emulator`; acá simplemente lo ejecutamos.
  functions-test:
    name: Functions Test (emulator)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      # El Emulator Suite corre sobre la JVM. firebase-tools v15 exige Java 21+.
      - name: Set up Java (emulator suite)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Cachea los binarios del emulador (firestore/auth/storage/ui) para no
      # re-descargarlos en cada run — más rápido y menos flaky ante hipos de red.
      - name: Cache Firebase emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-15.19.0

      - name: Install functions dependencies
        run: npm --prefix functions ci

      # Pineado a la versión de local (reproducibilidad). No es dep de functions/.
      - name: Install firebase-tools
        run: npm install -g firebase-tools@15.19.0

      # Pasada 1: tests emulator-backed (project treino-dev, admin SDK).
      - name: Run emulator-backed tests (treino-dev)
        run: npm --prefix functions run test:integration:emulator

      # Pasada 2: tests de reglas de Firestore (project treino-rules-test).
      - name: Run Firestore rules tests (treino-rules-test)
        run: npm --prefix functions run test:rules:emulator
