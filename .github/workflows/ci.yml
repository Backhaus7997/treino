name: CI

# Corre en cada PR a main y en cada push a main. El objetivo: que NINGÚN merge
# que no compile o que rompa tests pueda entrar a main (los breakages de #150 y
# #152/#153 habrían sido frenados acá).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela runs viejos del mismo PR/branch para no gastar minutos al pedo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Fijado a la versión del entorno de desarrollo para reproducibilidad.
          # Si actualizan Flutter local, actualizá este número.
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Falla ante ERRORES (los args duplicados / marcadores de conflicto /
      # nombres indefinidos que se colaron a main por merges malos son errores).
      # Warnings/infos NO bloquean — hay deuda de lint pre-existente en el l10n
      # generado que no queremos que trabe todos los PRs.
      - name: Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      # El gate duro: si el código no compila o falla algún test, el job falla
      # y (con branch protection activada) el PR NO se puede mergear.
      - name: Run tests
        run: flutter test

  # Gate de compilación para las Cloud Functions (functions/, Node 20 + TS).
  # Antes NADIE compilaba functions en CI: flutter analyze/test no ven functions/,
  # así que un error de tipos o de compilación en functions/src podía entrar a
  # main sin que nada lo frenara. Este job corre `tsc` y falla ante cualquiera.
  # Rápido y sin Java → feedback inmediato. Los tests (jest contra el Emulator
  # Suite) viven en el job `functions-test` de abajo.
  functions-build:
    name: Functions Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      # Instala exactamente lo del lockfile (reproducible, igual que en local).
      - name: Install functions dependencies
        run: npm --prefix functions ci

      - name: Build functions (tsc)
        run: npm --prefix functions run build

  # Corre los tests de las Cloud Functions (jest) contra el Firebase Emulator
  # Suite. Era el agujero que faltaba: hasta ahora los tests de functions/ —
  # incluidos los de reglas de seguridad, que nunca se ejecutaron en CI (ver
  # #360) — no corrían nunca. Requisitos: Java 21+ (lo exige el Emulator Suite
  # de firebase-tools 15+) y el CLI de firebase.
  #
  # Una sola pasada `emulators:exec --only firestore,auth "npm test"` replica el
  # flujo documentado en functions/README.md: emulador con el project default
  # `treino-dev` (.firebaserc) + `npm test`. Los tests de reglas usan sus propios
  # projectIds vía @firebase/rules-unit-testing y conviven en el mismo emulador
  # (mismo esquema que corren los devs en local). El emulador NO necesita login.
  functions-test:
    name: Functions Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      # El Emulator Suite de firebase-tools 15+ no arranca sin Java 21+.
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install functions dependencies
        run: npm --prefix functions ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # Levanta firestore + auth, corre TODO el suite (unit + emulator-backed +
      # rules) y baja el emulador. El script `test` ya trae --forceExit.
      - name: Run functions tests against the emulator
        run: firebase emulators:exec --only firestore,auth "npm --prefix functions test"
